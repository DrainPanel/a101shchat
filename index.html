<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesaj Panosu</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
        h1 { color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        textarea, input { width: 100%; padding: 10px; margin: 10px 0; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .message { border-bottom: 1px solid #ddd; padding: 15px 0; }
        .admin-btn { background: #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Yazı Yaz - Misafir Defteri</h1>
        
        <!-- Mesaj Bırakma Formu -->
        <form id="messageForm">
            <input type="text" id="name" placeholder="İsim (opsiyonel)" value="Anonim">
            <textarea id="message" rows="5" placeholder="Mesajını yaz..." required></textarea>
            <button type="submit">Gönder</button>
        </form>

        <hr>
        <button onclick="showAdmin()" class="admin-btn">Admin Panel</button>

        <!-- Tüm Mesajlar (Ziyaretçiler görebilir) -->
        <h2>Tüm Mesajlar</h2>
        <div id="messages"></div>
    </div>

    <!-- Admin Modal -->
    <div id="adminModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7);">
        <div style="background:white; margin:50px auto; padding:20px; max-width:700px; border-radius:8px;">
            <h2>Admin Giriş</h2>
            <input type="text" id="username" placeholder="Kullanıcı: admin" value="admin"><br><br>
            <input type="password" id="password" placeholder="Şifre: 123456" value="123456"><br><br>
            <button onclick="loginAdmin()">Giriş Yap</button>
            <button onclick="closeModal()">Kapat</button>
            
            <div id="adminPanel" style="display:none; margin-top:20px;">
                <h2>Admin Panel - Tüm Mesajlar</h2>
                <button onclick="exportToTxt()">TXT İndir</button>
                <button onclick="clearAll()">Tümünü Sil</button>
                <div id="adminMessages"></div>
                <button onclick="logoutAdmin()">Çıkış</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'guestMessages';

        function loadMessages() {
            const messages = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const container = document.getElementById('messages');
            container.innerHTML = '';
            
            messages.reverse().forEach((msg, index) => {
                const div = document.createElement('div');
                div.className = 'message';
                div.innerHTML = `
                    <strong>${msg.name}</strong> - ${msg.time}<br>
                    ${msg.text}
                `;
                container.appendChild(div);
            });
        }

        function saveMessage(name, text) {
            const messages = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            messages.push({
                name: name || 'Anonim',
                text: text,
                time: new Date().toLocaleString('tr-TR')
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
            loadMessages();
        }

        // Form submit
        document.getElementById('messageForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const message = document.getElementById('message').value.trim();
            
            if (message) {
                saveMessage(name, message);
                document.getElementById('message').value = '';
                alert('Mesajın gönderildi!');
            }
        });

        // Admin
        let isAdmin = false;

        function showAdmin() {
            document.getElementById('adminModal').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
        }

        function loginAdmin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if (user === 'admin' && pass === '123456') {
                isAdmin = true;
                document.getElementById('adminPanel').style.display = 'block';
                loadAdminMessages();
            } else {
                alert('Yanlış kullanıcı/şifre!');
            }
        }

        function loadAdminMessages() {
            const messages = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const container = document.getElementById('adminMessages');
            container.innerHTML = '';
            
            messages.reverse().forEach((msg, index) => {
                const div = document.createElement('div');
                div.className = 'message';
                div.innerHTML = `
                    <strong>${msg.name}</strong> - ${msg.time}<br>
                    ${msg.text}
                    <br><button onclick="deleteMessage(${messages.length - 1 - index})">Sil</button>
                `;
                container.appendChild(div);
            });
        }

        function deleteMessage(index) {
            let messages = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            messages.splice(index, 1);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
            loadMessages();
            loadAdminMessages();
        }

        function clearAll() {
            if (confirm('Tüm mesajları silmek istediğinden emin misin?')) {
                localStorage.removeItem(STORAGE_KEY);
                loadMessages();
                loadAdminMessages();
            }
        }

        function exportToTxt() {
            const messages = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            let text = 'Misafir Defteri\n\n';
            messages.forEach(msg => {
                text += `${msg.name} - \( {msg.time}\n \){msg.text}\n\n---\n\n`;
            });
            
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'mesajlar.txt';
            a.click();
        }

        function logoutAdmin() {
            isAdmin = false;
            closeModal();
        }

        function closeModal() {
            document.getElementById('adminModal').style.display = 'none';
        }

        // Sayfa yüklenince mesajları göster
        window.onload = loadMessages;
    </script>
</body>
  </html>
