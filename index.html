<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shadow Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        :root {
            --bg-main: #060913;
            --bg-sidebar: #0b0f19;
            --bg-chat: rgba(15, 23, 42, 0.6);
            --bg-input: #1e293b;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #10b981;
            --radius: 14px;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
        }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Arka Plan Hareketli Animasyon Efekti */
        body::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(99, 102, 241, 0.1), transparent 40%),
                        radial-gradient(circle at 70% 70%, rgba(192, 132, 252, 0.08), transparent 45%);
            animation: aurora 20s linear infinite;
            z-index: -1;
        }
        @keyframes aurora {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            position: relative;
            backdrop-filter: blur(20px);
        }

        /* Sidebar - Fütüristik Efektli */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            padding: 24px;
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            z-index: 99;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }
        
        .sidebar-brand {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #a5b4fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 35px;
        }

        .channel-item {
            padding: 14px 18px;
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.1), transparent);
            border-left: 3px solid var(--accent);
            border-radius: 4px var(--radius) var(--radius) 4px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Chat Bölümü */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-chat);
            height: 100vh;
            position: relative;
        }

        .header {
            padding: 18px 24px;
            background: rgba(11, 15, 25, 0.7);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 24px;
            cursor: pointer;
        }

        /* Mesaj Alanı ve Kusursuz Yaylanma Animasyonları */
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message {
            opacity: 0;
            animation: dynamicPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            max-width: 80%;
            transition: transform 0.2s;
        }

        @keyframes dynamicPop {
            from { opacity: 0; transform: translateY(15px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .msg-meta {
            font-size: 13px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .msg-user {
            font-weight: 700;
            color: #c084fc;
        }

        .msg-time {
            color: var(--text-muted);
            font-size: 11px;
        }

        .msg-content {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px 18px;
            border-radius: 4px var(--radius) var(--radius) var(--radius);
            line-height: 1.5;
            word-break: break-word;
        }

        .message:hover {
            transform: translateX(3px);
        }

        /* Giriş ve Form Yapısı */
        .input-area {
            padding: 16px 20px;
            background: rgba(11, 15, 25, 0.8);
            border-top: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input, textarea {
            background: var(--bg-input);
            border: 1px solid rgba(255,255,255,0.05);
            color: white;
            border-radius: var(--radius);
            padding: 12px 16px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        textarea {
            flex: 1;
            resize: none;
            height: 48px;
        }

        /* Efektli Butonlar */
        button {
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        button:hover {
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        
        button:active {
            transform: scale(0.96);
        }

        /* Spam Engel Ekranı (Overlay Modu) */
        .cooldown-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6, 9, 19, 0.95);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            z-index: 10;
            text-align: center;
            padding: 10px;
        }

        /* Modallar */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 7, 18, 0.85);
            backdrop-filter: blur(12px);
            display: none; align-items: center; justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7);
        }

        /* Mobil Optimizasyonları (Kusursuz Responsive) */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute; 
                left: 0; top: 0; bottom: 0;
                transform: translateX(-100%);
            }
            .sidebar.active { 
                transform: translateX(0); 
            }
            .menu-toggle { 
                display: block; 
            }
            .message { 
                max-width: 90%; 
            }
            .header {
                padding: 14px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-brand">Shadow Chat</div>
            <div class="channel-list" style="flex:1;">
                <div class="channel-item"><span>#</span> genel-sohbet</div>
            </div>
            <button onclick="showAdminModal()" style="width:100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);">Yönetici Paneli</button>
        </div>

        <!-- Chat Alanı -->
        <div class="chat">
            <div class="header">
                <button class="menu-toggle" onclick="toggleSidebar(event)">☰</button>
                <div style="font-size:18px; font-weight:700;"># genel-sohbet</div>
            </div>
            
            <div id="messages" class="messages"></div>
            
            <div class="input-area">
                <!-- Spam Koruma Kalkanı -->
                <div id="cooldownOverlay" class="cooldown-overlay">
                    <h4 style="color:var(--danger); margin-bottom:4px; font-weight:700;">⚠️ Spam Engeli</h4>
                    <p style="color:var(--text-muted); font-size:13px;">Çok hızlısın! Kalan Süre: <span id="cooldownTimer" style="color:white; font-weight:700;">05:00</span></p>
                </div>

                <form id="msgForm" class="form-grid">
                    <input type="text" id="name" placeholder="İsim (Opsiyonel)" value="Anonim">
                    <div class="input-row">
                        <textarea id="message" placeholder="Mesaj yaz..." required></textarea>
                        <button type="submit">Gönder</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Admin Modal -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px; font-size:22px;">Giriş Yetkilendirmesi</h2>
            <input type="text" id="username" value="admin" style="width:100%; margin-bottom:12px;">
            <input type="password" id="password" placeholder="Şifre" style="width:100%; margin-bottom:24px;">
            <button onclick="loginAdmin()" style="width:100%; margin-bottom:12px;">Giriş Yap</button>
            <button onclick="closeModal()" style="background:#334155; width:100%;">İptal</button>
            
            <div id="adminPanel" style="display:none; margin-top:24px; border-top:1px solid rgba(255,255,255,0.1); padding-top:24px;">
                <h3 style="margin-bottom:16px; font-size:16px;">Veri Yönetimi</h3>
                <div style="display:flex; gap:12px; margin-bottom:16px;">
                    <button onclick="exportToTxt()" style="background:var(--success); flex:1;">TXT İndir</button>
                    <button onclick="clearAll()" style="background:var(--danger); flex:1;">Tümünü Sil</button>
                </div>
                <div id="adminMessages" style="max-height:200px; overflow-y:auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'shadowMessages';
        
        let messageTimestamps = []; 
        let isBanned = false;
        let banEndTime = 0;
        let countdownInterval;

        function toggleSidebar(e) {
            e.stopPropagation();
            document.getElementById('sidebar').classList.toggle('active');
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        // Akıllı Spam Filtresi
        function checkSpamLimit() {
            const now = Date.now();
            
            if (isBanned) {
                if (now >= banEndTime) {
                    isBanned = false;
                    localStorage.removeItem('shadow_ban_time');
                    document.getElementById('cooldownOverlay').style.display = 'none';
                    clearInterval(countdownInterval);
                } else {
                    return false;
                }
            }

            messageTimestamps = messageTimestamps.filter(timestamp => now - timestamp < 10000);
            messageTimestamps.push(now);

            if (messageTimestamps.length > 20) {
                isBanned = true;
                banEndTime = now + (5 * 60 * 1000); 
                localStorage.setItem('shadow_ban_time', banEndTime);
                startBanCountdown();
                return false;
            }

            return true;
        }

        function startBanCountdown() {
            document.getElementById('cooldownOverlay').style.display = 'flex';
            if(countdownInterval) clearInterval(countdownInterval);

            countdownInterval = setInterval(() => {
                const now = Date.now();
                const remaining = banEndTime - now;

                if (remaining <= 0) {
                    isBanned = false;
                    localStorage.removeItem('shadow_ban_time');
                    document.getElementById('cooldownOverlay').style.display = 'none';
                    clearInterval(countdownInterval);
                } else {
                    const m = Math.floor(remaining / 60000).toString().padStart(2, '0');
                    const s = Math.floor((remaining % 60000) / 1000).toString().padStart(2, '0');
                    document.getElementById('cooldownTimer').innerText = `${m}:${s}`;
                }
            }, 1000);
        }

        function checkExistingBan() {
            const savedBan = localStorage.getItem('shadow_ban_time');
            if (savedBan) {
                const now = Date.now();
                if (now < parseInt(savedBan)) {
                    isBanned = true;
                    banEndTime = parseInt(savedBan);
                    startBanCountdown();
                } else {
                    localStorage.removeItem('shadow_ban_time');
                }
            }
        }

        function loadMessages() {
            const msgs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const container = document.getElementById('messages');
            container.innerHTML = '';
            
            msgs.forEach((msg, i) => {
                const div = document.createElement('div');
                div.className = 'message';
                
                div.innerHTML = `
                    <div class="msg-meta">
                        <span class="msg-user">${escapeHTML(msg.name)}</span>
                        <span class="msg-time">${msg.time}</span>
                    </div>
                    <div class="msg-content">${msg.text}</div>
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        // Form Gönderme İşlemi Tamamen Düzeltildi
        document.getElementById('msgForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (!checkSpamLimit()) return;

            const nameInput = document.getElementById('name');
            const messageInput = document.getElementById('message');
            
            const name = nameInput.value.trim() || 'Anonim';
            const text = messageInput.value.trim();
            
            if (text) {
                let msgs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                msgs.push({
                    name: name,
                    text: escapeHTML(text).replace(/\n/g, '<br>'),
                    time: new Date().toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'})
                });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs));
                loadMessages();
                messageInput.value = '';
            }
        });

        function showAdminModal() {
            document.getElementById('adminModal').style.display = 'flex';
            setTimeout(() => { document.getElementById('password').value = 'shadow2026'; }, 200);
        }

        function loginAdmin() {
            if (document.getElementById('username').value === 'admin' && document.getElementById('password').value === 'shadow2026') {
                document.getElementById('adminPanel').style.display = 'block';
                loadAdminMessages();
            } else {
                alert('❌ Yetkisiz Erişim!');
                closeModal();
            }
        }

        function loadAdminMessages() {
            const msgs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const container = document.getElementById('adminMessages');
            container.innerHTML = '';
            
            msgs.slice().reverse().forEach((msg, idx) => {
                const realIndex = msgs.length - 1 - idx;
                const div = document.createElement('div');
                div.style.cssText = "background:rgba(255,255,255,0.02); padding:10px; border-radius:8px; margin-bottom:8px; border:1px solid rgba(255,255,255,0.05);";
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong>${escapeHTML(msg.name)}</strong>
                        <button onclick="deleteMsg(${realIndex})" style="background:var(--danger); padding:2px 8px; font-size:11px;">Sil</button>
                    </div>
                    <div style="color:var(--text-muted); font-size:13px; margin-top:4px;">${msg.text}</div>
                `;
                container.appendChild(div);
            });
        }

        window.deleteMsg = function(index) {
            let msgs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            msgs.splice(index, 1);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs));
            loadMessages();
            loadAdminMessages();
        };

        function exportToTxt() {
            const msgs = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            let txt = "Shadow Chat Log\n\n";
            msgs.forEach(m => txt += `${m.name} [${m.time}]: ${m.text.replace(/<br>/g, '\n')}\n---\n`);
            const blob = new Blob([txt], {type: 'text/plain;charset=utf-8'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'chat_logs.txt';
            a.click();
        }

        function clearAll() {
            if (confirm('Tüm verileri silmek istediğine emin misin?')) {
                localStorage.removeItem(STORAGE_KEY);
                loadMessages();
                loadAdminMessages();
            }
        }

        function closeModal() {
            document.getElementById('adminModal').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('password').value = '';
        }

        // Mobil Tıklama Kontrolü
        document.addEventListener('click', function(e) {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth <= 768 && sidebar.classList.contains('active')) {
                if (!sidebar.contains(e.target)) {
                    sidebar.classList.remove('active');
                }
            }
        });

        window.onload = () => {
            checkExistingBan();
            loadMessages();
        };
    </script>
</body>
</html>
